<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Bulk Google Indexer</title>
    <style>
        body {
            font-family: system-ui;
            background: #0f172a;
            color: #e2e8f0;
            margin: 40px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        textarea,
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1e2937;
            border: 1px solid #475569;
            color: white;
        }

        button {
            padding: 14px 28px;
            background: #3b82f6;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #2563eb;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🚀 Bulk Google Indexer (100 URLs/batch)</h1>
        <form action="/submit-urls" method="post" enctype="multipart/form-data">
            <h3>Paste URLs (one per line)</h3>
            <textarea name="urls_text" rows="12" placeholder="https://example.com/page1"></textarea>

            <h3>OR Upload CSV/TXT</h3>
            <input type="file" name="file" accept=".csv,.txt">

            <br><button type="submit">Submit to Googlebot</button>
        </form>
        <p><small>Uses official Google Indexing API • Max 100 URLs per request</small></p>
    </div>
</body>

</html>
